name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: podking
          POSTGRES_PASSWORD: podking
          POSTGRES_DB: podking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podking -d podking_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://podking:podking@localhost:5432/podking_test
      PGPASSWORD: podking

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Enable pgvector extension
        run: psql -h localhost -U podking -d podking_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Install deps
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy backend/podking
      - name: Test
        run: uv run pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
